<!doctype html>
<html>
<!-- adapted from rendercanvas -->
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Rendercanvas example.py in Pyodide</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v314.0.2/full/pyodide.js"></script>
</head>

<body>
    <div id="canvas" class='renderview-wrapper is-resizable has-titlebar' style="width: 80%; height: 480px;">
        <p id="loading"; style='width:100%; height:80%; background:#aaa; display: flex; justify-content: center; align-items: center; font-size:150%'>click the button to load pyodide</p>
        <button id="load_button" type="button" onclick="main()">load in browser!</button>
    </div>
    <div id="output" style="white-space: per-line; overflow-y: auto; height:90px; background:#eee; border:1px solid #ccc;">
        <p>Output:</p>
    </div>
    <script type="text/javascript">
        async function main() {
            let button = document.getElementById("load_button");
            button.disabled = true;
            button.innerText = "loading...";
            let loading = document.getElementById('loading');
            try {
                let example_name = document.location.hash.slice(1);
                pythonCode = await (await fetch(example_name)).text();
                let pyodide = await loadPyodide();
                pyodide.setStdout({
                    batched: (s) => {
                        el = document.getElementById("output");
                        el.innerHTML += "<br>" + s.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        el.scrollTop = el.scrollHeight;  // scroll to bottom
                        console.log(s); // so we also have it formatted
                    }
                });
                await pyodide.loadPackage("micropip");
                const micropip = pyodide.pyimport("micropip");
                // we don't always need all of these... but to avoid more templating, let's have them all for now...
                // await micropip.install('sniffio');
                await micropip.install('rendercanvas>=2.7');
                await pyodide.loadPackagesFromImports(pythonCode); // load all the packages that an example imports... but not from pypi?
                // The below loads wgpu from pypi. But we will replace it with the name of the wheel, Maybe it's better to use constraints and a static url: https://micropip.pyodide.org/en/stable/project/usage.html#constraining-indirect-dependencies
                // so that it's loaded from the docs (in _static).
                await micropip.install("wgpu");
                // Run the Python code async because some calls are async it seems.
                let ret = await pyodide.runPythonAsync(pythonCode);
                console.log("Example finished:", ret);
                // TODO: redirect stdout for compute examples
            } catch (err) {
                loading.innerHTML = "Failed to load: " + err;
                console.error(err); // so we have it here too
            }
        }
    </script>
</body>

</html>
